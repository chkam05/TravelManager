<section class="map-panel" aria-label="OpenStreetMap">
    <div class="map-panel__map" id="map"></div>
    <div class="map-toolbar" aria-label="Narzędzia mapy">
        <button class="map-toolbar__button map-toolbar__button--legend" data-map-tool="legend" type="button" aria-label="Legenda">
            <span class="map-toolbar__tooltip" role="tooltip">Legenda</span>
        </button>
        <button class="map-toolbar__button map-toolbar__button--location" data-map-tool="location" type="button" aria-label="Moja lokalizacja">
            <span class="map-toolbar__tooltip" role="tooltip">Moja lokalizacja</span>
        </button>
        <button class="map-toolbar__button map-toolbar__button--layers" data-map-tool="layers" type="button" aria-label="Warstwy">
            <span class="map-toolbar__tooltip" role="tooltip">Warstwy</span>
        </button>
    </div>
</section>
