<div class="header__view header__view--active" data-header-view="map">
    <div class="header__view-left">
        <h1 class="header__title">{{ app_name }}</h1>
    </div>
    <div class="header__view-center">
        <form class="header__search" role="search" aria-label="Szukaj miejsca">
            <input class="header__search-input" type="search" name="place" placeholder="Szukaj miejsca" aria-label="Szukaj miejsca">
            <span class="header__search-actions" role="group" aria-label="Opcje wyszukiwania">
                <button class="header__search-button" type="submit" aria-label="Szukaj"></button>
                <button class="header__advanced-search-button" type="button" aria-label="Wyszukiwanie zaawansowane" title="Wyszukiwanie zaawansowane">
                    <i data-lucide="chevron-down" aria-hidden="true"></i>
                </button>
            </span>
        </form>
    </div>
    <div class="header__view-right">
        <button class="header__car-button" type="button" hidden>
            <i data-lucide="car" aria-hidden="true"></i>
            <span class="header__car-button-text">Samochód</span>
        </button>
    </div>
</div>
