<aside class="search-results-panel" id="search-results-panel" aria-live="polite" aria-hidden="true">
    <div class="search-results-panel__grabber" data-search-results-panel-grabber aria-hidden="true"></div>
    <div class="search-results-panel__body">
        <div class="search-results-panel__header">
            <div class="search-results-panel__heading">
                <h2 class="search-results-panel__title" id="search-results-panel-title">Wyniki wyszukiwania</h2>
                <p class="search-results-panel__subtitle" id="search-results-panel-subtitle"></p>
            </div>
            <div class="search-results-panel__header-actions">
                <button class="search-results-panel__close" data-search-results-panel-close type="button" aria-label="Zamknij panel"></button>
            </div>
        </div>
        <div class="search-results-panel__content">
            <div class="search-results-panel__toolbar">
                <p class="search-results-panel__status" id="search-results-panel-status"></p>
                <button class="search-results-panel__retry" id="search-results-panel-retry" type="button" hidden>
                    <i data-lucide="refresh-cw" aria-hidden="true"></i>
                    <span>Ponów</span>
                </button>
            </div>
            <div class="search-results-panel__list" id="search-results-panel-list"></div>
        </div>
    </div>
</aside>
