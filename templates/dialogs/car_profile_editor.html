<form class="car-profile-editor" id="car-profile-editor" role="dialog" aria-modal="true" aria-labelledby="car-profile-editor-title" aria-hidden="true">
    <header class="car-profile-editor__header">
        <h2 id="car-profile-editor-title">Dodaj samochód</h2>
        <button class="car-profile-editor__close" data-car-profile-editor-cancel type="button" aria-label="Zamknij"></button>
    </header>

    <div class="car-profile-editor__content">
        <fieldset class="car-profile-editor__group">
            <legend>Podstawowe</legend>
            <label class="car-profile-editor__field">
                <span>Nazwa</span>
                <input name="name" type="text" maxlength="120" autocomplete="off">
            </label>
            <label class="car-profile-editor__field">
                <span>Marka</span>
                <input name="brand" type="text" maxlength="80" autocomplete="off">
            </label>
            <label class="car-profile-editor__field">
                <span>Model</span>
                <input name="model" type="text" maxlength="80" autocomplete="off">
            </label>
            <label class="car-profile-editor__field">
                <span>Wersja</span>
                <input name="version" type="text" maxlength="120" autocomplete="off">
            </label>
            <label class="car-profile-editor__field">
                <span>Generacja</span>
                <input name="generation" type="text" maxlength="120" autocomplete="off">
            </label>
            <label class="car-profile-editor__field">
                <span>Rok produkcji</span>
                <input name="production_year" type="number" min="1886" max="2300">
            </label>
            <label class="car-profile-editor__field">
                <span>Nr. rejestracyjny</span>
                <input name="registration_number" type="text" maxlength="32" autocomplete="off">
            </label>
        </fieldset>

        <fieldset class="car-profile-editor__group">
            <legend>Techniczne</legend>
            <label class="car-profile-editor__field">
                <span>Typ nadwozia</span>
                <select name="body_type">
                    <option value="">Brak</option>
                    <option value="Hatchback">Hatchback</option>
                    <option value="Sedan">Sedan</option>
                    <option value="Kombi">Kombi</option>
                    <option value="Coupe">Coupe</option>
                    <option value="Kabriolet">Kabriolet</option>
                    <option value="Liftback">Liftback</option>
                    <option value="Fastback">Fastback</option>
                    <option value="SUV">SUV</option>
                    <option value="Crossover">Crossover</option>
                    <option value="Minivan / MPV">Minivan / MPV</option>
                    <option value="Roadster">Roadster</option>
                    <option value="Pickup">Pickup</option>
                    <option value="Van">Van</option>
                </select>
            </label>
            <label class="car-profile-editor__field">
                <span>Pojemność silnika (cm3)</span>
                <input name="engine_capacity" type="number" min="0" step="1">
            </label>
            <label class="car-profile-editor__field">
                <span>Moc (KM)</span>
                <input name="power_hp" type="number" min="0" step="1">
            </label>
            <label class="car-profile-editor__field">
                <span>Moc (kW)</span>
                <input name="power_kw" type="number" min="0" step="0.01">
            </label>
            <label class="car-profile-editor__field">
                <span>Maksymalna prędkość (km/h)</span>
                <input name="max_speed" type="number" min="0" step="1">
            </label>
            <label class="car-profile-editor__field">
                <span>Rodzaj napędu</span>
                <select name="drive_type">
                    <option value="">Brak</option>
                    <option value="Przednia oś">Przednia oś</option>
                    <option value="Tylna oś">Tylna oś</option>
                    <option value="AWD">AWD</option>
                    <option value="4x4">4x4</option>
                </select>
            </label>
            <label class="car-profile-editor__field">
                <span>Rodzaj skrzyni biegów</span>
                <select name="transmission_type">
                    <option value="">Brak</option>
                    <option value="Manualna">Manualna</option>
                    <option value="Automatyczna">Automatyczna</option>
                    <option value="Półautomatyczna">Półautomatyczna</option>
                    <option value="Zautomatyzowana manualna">Zautomatyzowana manualna</option>
                    <option value="CVT">CVT</option>
                    <option value="Dwusprzęgłowa">Dwusprzęgłowa</option>
                </select>
            </label>
            <label class="car-profile-editor__field">
                <span>Pojemność baku (L)</span>
                <input name="fuel_tank_capacity" type="number" min="0" step="0.1">
            </label>
        </fieldset>

        <fieldset class="car-profile-editor__group">
            <legend>Paliwo</legend>
            <label class="car-profile-editor__field">
                <span>Typ paliwa</span>
                <select name="fuel_type">
                    <option value="95">95</option>
                    <option value="98">98</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Gaz">Gaz</option>
                    <option value="Elektryczny">Elektryczny</option>
                    <option value="Wodór">Wodór</option>
                </select>
            </label>
            <label class="car-profile-editor__field">
                <span>Dodatkowy typ paliwa</span>
                <select name="secondary_fuel_type">
                    <option value="">Brak</option>
                    <option value="Gaz">Gaz</option>
                    <option value="Elektryczny">Elektryczny</option>
                    <option value="95">95</option>
                    <option value="98">98</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Wodór">Wodór</option>
                </select>
            </label>
            <label class="car-profile-editor__field">
                <span>Minimalne spalanie (L/100km)</span>
                <input name="min_consumption" type="number" min="0" step="0.01">
            </label>
            <label class="car-profile-editor__field">
                <span>Maksymalne spalanie (L/100km)</span>
                <input name="max_consumption" type="number" min="0" step="0.01">
            </label>
        </fieldset>

        <fieldset class="car-profile-editor__group">
            <legend>Przebieg</legend>
            <div class="car-profile-editor__odometer" id="car-profile-editor-odometer"></div>
            <button class="car-profile-editor__small-button" id="car-profile-editor-add-odometer" type="button">Dodaj przebieg</button>
        </fieldset>

        <fieldset class="car-profile-editor__group">
            <legend>Zdjęcie</legend>
            <input name="image" type="hidden">
            <div class="car-profile-editor__image-preview" id="car-profile-editor-image-preview" hidden>
                <img id="car-profile-editor-image-preview-img" alt="">
            </div>
            <div class="car-profile-editor__image-actions">
                <button class="car-profile-editor__small-button" id="car-profile-editor-select-image" type="button">Wybierz zdjęcie</button>
                <button class="car-profile-editor__small-button" id="car-profile-editor-remove-image" type="button" hidden>Usuń zdjęcie</button>
                <span id="car-profile-editor-image-name">Brak zdjęcia</span>
            </div>
        </fieldset>
    </div>

    <footer class="car-profile-editor__footer">
        <button class="car-profile-editor__button" data-car-profile-editor-cancel type="button">Anuluj</button>
        <button class="car-profile-editor__button car-profile-editor__button--primary" type="submit">Zapisz</button>
    </footer>
</form>
